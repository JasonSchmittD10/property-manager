# Sveltia CMS configuration for the Bashford tenant app.
#
# IMPORTANT — one-time setup (see docs/CMS-SETUP.md):
#   1. Replace `repo:` with the real GitHub OWNER/REPO.
#   2. Replace `base_url:` with the deployed Sveltia OAuth worker URL.
#
# Editing in the CMS writes JSON files under src/content/ and uploads
# media to public/photos or public/documents. The repo's tsconfig has
# `resolveJsonModule: true`, and src/config/property.ts imports each
# JSON file and re-exports it under its existing TypeScript interface,
# so a malformed save will fail the Vercel build loudly.

backend:
  name: github
  repo: JasonSchmittD10/property-manager
  branch: main
  base_url: https://sveltia-cms-auth.jason-bbe.workers.dev

# Default media library — hero photo + house manual photos.
media_folder: "public/photos"
public_folder: "/photos"

# UI niceties
publish_mode: simple
display_url: /
site_url: /

collections:
  # ----------------------------------------------------------------------
  # ANNOUNCEMENTS — high-value: post a notice that appears on Home.
  # Each announcement is its own file in src/content/announcements/.
  # The app reads src/content/announcements.json (an aggregated array),
  # so a save-time merge step would be nice but is overkill here: this
  # collection writes directly to announcements.json as a list of items.
  # ----------------------------------------------------------------------
  - name: announcements
    label: "Announcements & alerts"
    label_singular: "Announcement"
    description: "Notices shown on the Home screen. Leave empty for the quiet state."
    files:
      - name: announcements
        label: "Announcements list"
        file: "src/content/announcements.json"
        format: json
        fields:
          - name: items
            label: "Announcements"
            label_singular: "Announcement"
            widget: list
            allow_add: true
            collapsed: false
            summary: "{{fields.title}} — {{fields.date}}"
            fields:
              - { name: id, label: "ID (lowercase, no spaces)", widget: string, pattern: ['^[a-z0-9-]+$', "lowercase letters, numbers, hyphens"] }
              - { name: title, label: "Title", widget: string }
              - { name: date, label: "Date", widget: datetime, date_format: "YYYY-MM-DD", time_format: false, picker_utc: false }
              - { name: body, label: "Body", widget: text }

  # ----------------------------------------------------------------------
  # WELCOME NOTE (Guide tab — top card)
  # ----------------------------------------------------------------------
  - name: welcome
    label: "Welcome note"
    files:
      - name: welcome
        label: "Welcome note"
        file: "src/content/welcome.json"
        format: json
        fields:
          - { name: heading, label: "Heading", widget: string }
          - name: body
            label: "Body paragraphs"
            label_singular: "Paragraph"
            widget: list
            field: { name: paragraph, label: "Paragraph", widget: text }
          - { name: signoff, label: "Sign-off", widget: string }

  # ----------------------------------------------------------------------
  # QUICK INFO — wifi network/password, front door code, trash day,
  # recycling note. These are credentials, but the CMS uses GitHub
  # write access so only the landlords can read/edit them anyway.
  # The Home trash-day reminder parses the first weekday word out of
  # trashDay, so "Thursday (weekly)" / "Tuesday" both work.
  # ----------------------------------------------------------------------
  - name: quick_info
    label: "Quick info"
    files:
      - name: quick_info
        label: "Quick info"
        file: "src/content/quickInfo.json"
        format: json
        fields:
          - { name: wifiNetwork, label: "Wi-Fi network name", widget: string }
          - { name: wifiPassword, label: "Wi-Fi password", widget: string }
          - { name: frontDoorCode, label: "Front door code", widget: string }
          - { name: trashDay, label: "Trash day (e.g. \"Thursday (weekly)\")", widget: string }
          - { name: recyclingNote, label: "Recycling note", widget: text }

  # ----------------------------------------------------------------------
  # RENT — math + due date + notes. The payment recipient (Zelle email)
  # stays in code so a wrong-handle save can't route tenants' rent to the
  # wrong account.
  # ----------------------------------------------------------------------
  - name: rent_notes
    label: "Rent"
    files:
      - name: rent_notes
        label: "Rent"
        file: "src/content/rentNotes.json"
        format: json
        fields:
          - { name: baseRent, label: "Base rent ($/month)", widget: number, value_type: int, min: 0, step: 1 }
          - { name: internetCharge, label: "Internet charge ($/month, on top of base rent)", widget: number, value_type: int, min: 0, step: 1 }
          - { name: dueDayOfMonth, label: "Due day of month (1–31)", widget: number, value_type: int, min: 1, max: 31, step: 1 }
          - { name: dueDay, label: "Due day — display label (e.g. \"1st of each month\")", widget: string }
          - { name: autoPayNote, label: "AutoPay note", widget: text }
          - { name: latePolicy, label: "Late policy", widget: text }

  # ----------------------------------------------------------------------
  # HERO PHOTO (Home screen) — single media field.
  # ----------------------------------------------------------------------
  - name: property_media
    label: "Hero photo"
    files:
      - name: property_media
        label: "Hero photo"
        file: "src/content/propertyMedia.json"
        format: json
        fields:
          - name: heroPhoto
            label: "Hero photo"
            widget: image
            required: true
            media_folder: "public/photos"
            public_folder: "/photos"

  # ----------------------------------------------------------------------
  # HOUSE MANUAL — repeatable entries, each with optional photo.
  # ----------------------------------------------------------------------
  - name: house_manual
    label: "House manual"
    files:
      - name: house_manual
        label: "House manual entries"
        file: "src/content/houseManual.json"
        format: json
        fields:
          - name: items
            label: "Entries"
            label_singular: "Entry"
            widget: list
            allow_add: true
            summary: "{{fields.title}}"
            fields:
              - { name: id, label: "ID (lowercase, no spaces)", widget: string, pattern: ['^[a-z0-9-]+$', "lowercase letters, numbers, hyphens"] }
              - { name: title, label: "Title", widget: string }
              - name: photo
                label: "Photo (optional)"
                widget: image
                required: false
                media_folder: "public/photos"
                public_folder: "/photos"
              - name: body
                label: "Body paragraphs"
                label_singular: "Paragraph"
                widget: list
                field: { name: paragraph, label: "Paragraph", widget: text }

  # ----------------------------------------------------------------------
  # GUIDE — categories of favorite local spots.
  # ----------------------------------------------------------------------
  - name: guide
    label: "Guide — neighborhood spots"
    files:
      - name: guide
        label: "Guide categories"
        file: "src/content/guide.json"
        format: json
        fields:
          - name: categories
            label: "Categories"
            label_singular: "Category"
            widget: list
            allow_add: true
            summary: "{{fields.title}}"
            fields:
              - { name: id, label: "Category ID", widget: string, pattern: ['^[a-z0-9-]+$', "lowercase letters, numbers, hyphens"] }
              - { name: title, label: "Category title", widget: string }
              - name: spots
                label: "Spots"
                label_singular: "Spot"
                widget: list
                allow_add: true
                summary: "{{fields.name}}"
                fields:
                  - { name: id, label: "Spot ID", widget: string, pattern: ['^[a-z0-9-]+$', "lowercase letters, numbers, hyphens"] }
                  - { name: name, label: "Name", widget: string }
                  - { name: town, label: "Town (optional)", widget: string, required: false }
                  - { name: why, label: "Why you love it", widget: text }
                  - { name: link, label: "Link (optional)", widget: string, required: false }
                  - { name: address, label: "Address (optional — improves the map pin)", widget: string, required: false }
                  - { name: lat, label: "Latitude (optional — overrides geocoder)", widget: number, required: false, value_type: float, step: 0.000001 }
                  - { name: lng, label: "Longitude (optional — overrides geocoder)", widget: number, required: false, value_type: float, step: 0.000001 }

  # ----------------------------------------------------------------------
  # ESSENTIALS — nearest hospital, pharmacy, etc.
  # ----------------------------------------------------------------------
  - name: essentials
    label: "Essentials — getting around"
    files:
      - name: essentials
        label: "Essentials"
        file: "src/content/essentials.json"
        format: json
        fields:
          - name: items
            label: "Items"
            label_singular: "Item"
            widget: list
            allow_add: true
            summary: "{{fields.label}}: {{fields.name}}"
            fields:
              - { name: id, label: "ID", widget: string, pattern: ['^[a-z0-9-]+$', "lowercase letters, numbers, hyphens"] }
              - { name: label, label: "Label (e.g. Pharmacy)", widget: string }
              - { name: name, label: "Place name", widget: string }
              - { name: phone, label: "Phone (optional)", widget: string, required: false }
              - { name: link, label: "Link (optional)", widget: string, required: false }

  # ----------------------------------------------------------------------
  # SEASONAL TIPS
  # ----------------------------------------------------------------------
  - name: seasonal_tips
    label: "Seasonal tips"
    files:
      - name: seasonal_tips
        label: "Seasonal tips"
        file: "src/content/seasonalTips.json"
        format: json
        fields:
          - name: items
            label: "Tips"
            label_singular: "Tip"
            widget: list
            allow_add: true
            summary: "{{fields.title}}"
            fields:
              - { name: id, label: "ID", widget: string, pattern: ['^[a-z0-9-]+$', "lowercase letters, numbers, hyphens"] }
              - { name: title, label: "Title", widget: string }
              - { name: body, label: "Body", widget: text }

  # ----------------------------------------------------------------------
  # VERSE OF THE DAY — rotation list (references only).
  # The Home dashboard fetches the ASV text live from bible-api.com and
  # rotates by day-of-year, so the order here doesn't matter — just the
  # set. Use canonical references (e.g. "John 3:16", "Philippians 4:6-7").
  # ----------------------------------------------------------------------
  - name: verses
    label: "Verse of the day"
    files:
      - name: verses
        label: "Verse rotation"
        file: "src/content/verses.json"
        format: json
        fields:
          - name: references
            label: "References"
            label_singular: "Reference"
            widget: list
            allow_add: true
            field: { name: reference, label: "Reference", widget: string }

  # ----------------------------------------------------------------------
  # COMMUNITY (Faith & community section on Guide)
  # ----------------------------------------------------------------------
  - name: community
    label: "Faith & community"
    files:
      - name: community
        label: "Community section"
        file: "src/content/community.json"
        format: json
        fields:
          - { name: show, label: "Show this section?", widget: boolean, default: true }
          - { name: heading, label: "Heading", widget: string }
          - { name: intro, label: "Intro paragraph", widget: text }
          - name: items
            label: "Items"
            label_singular: "Item"
            widget: list
            allow_add: true
            summary: "{{fields.name}}"
            fields:
              - { name: id, label: "ID", widget: string, pattern: ['^[a-z0-9-]+$', "lowercase letters, numbers, hyphens"] }
              - { name: name, label: "Name", widget: string }
              - { name: detail, label: "Detail", widget: text }
              - { name: link, label: "Link (optional)", widget: string, required: false }

  # ----------------------------------------------------------------------
  # DOCUMENTS — each entry can attach a PDF that uploads to public/documents.
  # Sveltia handles committing the PDF and storing the path back into "file".
  # ----------------------------------------------------------------------
  - name: documents
    label: "Documents (PDFs)"
    files:
      - name: documents
        label: "Documents"
        file: "src/content/documents.json"
        format: json
        media_folder: "public/documents"
        public_folder: "/documents"
        fields:
          - name: items
            label: "Documents"
            label_singular: "Document"
            widget: list
            allow_add: true
            summary: "{{fields.title}}"
            fields:
              - { name: id, label: "ID", widget: string, pattern: ['^[a-z0-9-]+$', "lowercase letters, numbers, hyphens"] }
              - { name: title, label: "Title", widget: string }
              - { name: description, label: "Description (optional)", widget: text, required: false }
              - name: file
                label: "PDF file (optional — leave blank to show 'Coming soon')"
                widget: file
                required: false
                media_folder: "public/documents"
                public_folder: "/documents"
